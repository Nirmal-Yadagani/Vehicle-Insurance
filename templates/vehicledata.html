<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Insurance Prediction</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Vehicle Insurance Prediction</h1>

        <form method="post" action="/">
            <label for="Gender">Gender:</label>
            <select id="Gender" name="Gender" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label for="Age">Age:</label>
            <input type="number" id="Age" name="Age" placeholder="e.g. 44" required>

            <label for="Driving_License">Driving License (0: No, 1: Yes):</label>
            <input type="number" id="Driving_License" name="Driving_License" min="0" max="1" required>

            <label for="Region_Code">Region Code:</label>
            <input type="number" step="0.1" id="Region_Code" name="Region_Code" placeholder="e.g. 28.0" required>

            <label for="Previously_Insured">Previously Insured (0: No, 1: Yes):</label>
            <input type="number" id="Previously_Insured" name="Previously_Insured" min="0" max="1" required>

            <label for="Vehicle_Age">Vehicle Age:</label>
            <select id="Vehicle_Age" name="Vehicle_Age" required>
                <option value="" disabled selected>Select Vehicle Age</option>
                <option value="< 1 Year">&lt; 1 Year</option>
                <option value="1-2 Year">1-2 Year</option>
                <option value="> 2 Years">&gt; 2 Years</option>
            </select>

            <label for="Vehicle_Damage">Vehicle Damage:</label>
            <select id="Vehicle_Damage" name="Vehicle_Damage" required>
                <option value="" disabled selected>Select Damage Status</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label for="Annual_Premium">Annual Premium:</label>
            <input type="number" step="0.1" id="Annual_Premium" name="Annual_Premium" placeholder="e.g. 40454.0" required>

            <label for="Policy_Sales_Channel">Policy Sales Channel:</label>
            <input type="number" step="0.1" id="Policy_Sales_Channel" name="Policy_Sales_Channel" placeholder="e.g. 26.0" required>

            <label for="Vintage">Vintage (Days):</label>
            <input type="number" id="Vintage" name="Vintage" placeholder="e.g. 217" required>

            <button type="submit">Predict</button>
        </form>

        <form method="get" action="/train">
            <button type="submit" class="train-button">Train Model</button>
        </form>

        {% if context %}
            <div class="result">
                <h2>Result: {{ context }}</h2>
            </div>
        {% endif %}
    </div>
</body>
</html>
